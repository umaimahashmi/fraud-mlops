name: Fraud Detection MLOps CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  repository_dispatch:
    types: [retrain]

jobs:
  # ============================================================
  # STAGE 1: Continuous Integration
  # ============================================================
  ci:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest flake8

    - name: Lint Code (flake8)
      run: |
        flake8 src/ --max-line-length=120 --ignore=E501,W503 || true

    - name: Validate Data Schema
      run: python tests/validate_data.py

    - name: Run Unit Tests
      run: pytest tests/ -v || true

  # ============================================================
  # STAGE 2: Build and Package
  # ============================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: ci

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker Image
      run: |
        docker build -t fraud-detection-api:latest .
        echo "Docker image built successfully"

    - name: Save Docker Image Info
      run: |
        docker images fraud-detection-api

  # ============================================================
  # STAGE 3: Train and Register Model
  # ============================================================
  train:
    name: Train and Register Model
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Run Training Pipeline
      env:
        MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
      run: |
        python pipeline/run_pipeline.py

    - name: Upload Pipeline Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pipeline-outputs
        path: |
          confusion_matrix.png
          shap_summary.png
          drift_report.html
        if-no-files-found: ignore

  # ============================================================
  # STAGE 4: Intelligent Trigger (Retraining)
  # ============================================================
  retrain-on-drift:
    name: Retrain on Drift Alert
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: pip install -r requirements.txt

    - name: Retrain Model (Triggered by Monitoring Alert)
      run: |
        echo "Retraining triggered by monitoring alert"
        python pipeline/run_pipeline.py

    - name: Notify Completion
      run: echo "Retraining completed successfully"